app = 'did-pki-resolver'
primary_region = 'dfw'

[build]

[env]
  PORT = '8080'
  TRUST_STORE_PATH = '/app/trust-store/countries'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
